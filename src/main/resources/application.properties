# ===============================
# SERVER & APPLICATION
# ===============================
server.servlet.context-path=/api
server.port=${SERVER_PORT:8080}

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mercearia_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA & HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.use_sql_comments=true

# ===============================
# FLYWAY (Database Migrations)
# ===============================
spring.flyway.enabled=true
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===============================
# SECURITY & JWT
# ===============================
api.security.token.secret=${JWT_SECRET:your-super-secret-key-change-in-production-12345-minimum-32-chars}
api.security.token.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# MERCADO PAGO
# ===============================
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:test_token_change_in_production}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.exampbr.com.felipe.ecommerce_mercearia=DEBUG

# ===============================
# SWAGGER/OPENAPI CONFIGURATION
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.show-actuator=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Permitir Swagger sem autenticaÁ„o
springdoc.swagger-ui.disable-swagger-default-url=false