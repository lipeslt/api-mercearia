# ===== DATABASE =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mercearia_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA/HIBERNATE =====
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.open-in-view=false

# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== CACHE =====
spring.cache.type=simple
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ===== REDIS =====
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=2000ms

# ===== JWT TOKEN SECURITY =====
api.security.token.secret=${JWT_SECRET:mercearia_secret_key_2026_local_dev_only}
api.security.token.expiration=3600000
api.security.refresh-token.expiration=604800000

# ===== SWAGGER/OPENAPI =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=list
springdoc.show-actuator=true

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.endpoint.health.enabled=true

# ===== LOGGING =====
logging.level.root=INFO
logging.level.com.exampbr.com.felipe.ecommerce_mercearia=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== SERVER =====
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# ===== ENCODING =====
server.tomcat.uri-encoding=UTF-8

# ===== MERCADO PAGO =====
mercadopago.access-token=${MERCADO_PAGO_ACCESS_TOKEN:seu-token-sandbox-aqui}
mercadopago.environment=sandbox